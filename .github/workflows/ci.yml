name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests beautifulsoup4 PyYAML

      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx vite build

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check syntax
        run: |
          python -c "import ast; ast.parse(open('weather_scraper.py').read()); print('weather_scraper.py: OK')"
          python -c "import ast; ast.parse(open('backend/main.py').read()); print('backend/main.py: OK')"
          python -c "import ast; ast.parse(open('backend/api.py').read()); print('backend/api.py: OK')"
          python -c "import ast; ast.parse(open('backend/security.py').read()); print('backend/security.py: OK')"
          python -c "import ast; ast.parse(open('backend/models.py').read()); print('backend/models.py: OK')"
          python -c "import ast; ast.parse(open('backend/simple_api.py').read()); print('backend/simple_api.py: OK')"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Scottish Mountain Weather - Debug Panel</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h2 class="text-lg font-semibold mb-2">System Status</h2>
            <div id="status" class="space-y-2"></div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h2 class="text-lg font-semibold mb-2">Console Output</h2>
            <pre id="console" class="bg-gray-100 p-4 rounded text-sm overflow-auto max-h-96"></pre>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-2">Quick Actions</h2>
            <div class="space-x-2">
                <button onclick="checkMainApp()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Check Main App</button>
                <button onclick="testAPI()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Test API</button>
                <button onclick="clearConsole()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">Clear Console</button>
            </div>
        </div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status');
        const consoleEl = document.getElementById('console');
        
        const log = (msg, type = 'info') => {
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'gray';
            consoleEl.innerHTML += `<span style="color: ${color}">[${time}] ${msg}</span>\n`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };
        
        const addStatus = (label, status, details = '') => {
            const color = status === 'OK' ? 'green' : status === 'ERROR' ? 'red' : 'yellow';
            statusEl.innerHTML += `
                <div class="flex justify-between items-center">
                    <span class="font-medium">${label}</span>
                    <span class="text-${color}-600 font-semibold">${status}</span>
                </div>
                ${details ? `<div class="text-sm text-gray-600 ml-4">${details}</div>` : ''}
            `;
        };
        
        const clearConsole = () => {
            consoleEl.innerHTML = '';
            log('Console cleared');
        };
        
        const checkMainApp = async () => {
            log('Checking main app...');
            try {
                const response = await fetch('/');
                const html = await response.text();
                
                // Check for React root
                if (html.includes('id="root"')) {
                    log('✓ Root element found', 'success');
                } else {
                    log('✗ Root element NOT found', 'error');
                }
                
                // Check for main.tsx
                if (html.includes('main.tsx')) {
                    log('✓ main.tsx script found', 'success');
                } else {
                    log('✗ main.tsx script NOT found', 'error');
                }
                
                // Try to load main.tsx module
                log('Attempting to load main module...');
                const scriptResponse = await fetch('/src/main.tsx');
                if (scriptResponse.ok) {
                    log('✓ main.tsx is accessible', 'success');
                } else {
                    log('✗ main.tsx not accessible: ' + scriptResponse.status, 'error');
                }
                
            } catch (error) {
                log('Error checking main app: ' + error.message, 'error');
            }
        };
        
        const testAPI = async () => {
            log('Testing API endpoints...');
            
            // Test health
            try {
                const healthRes = await fetch('/api/v1/health');
                const health = await healthRes.json();
                log('✓ Health endpoint: ' + JSON.stringify(health), 'success');
            } catch (error) {
                log('✗ Health endpoint error: ' + error.message, 'error');
            }
            
            // Test locations
            try {
                const locRes = await fetch('/api/v1/locations');
                const locations = await locRes.json();
                log('✓ Locations endpoint: ' + locations.locations.length + ' locations found', 'success');
                
                // Test weather for first location
                if (locations.locations.length > 0) {
                    const firstLoc = locations.locations[0];
                    const weatherRes = await fetch(`/api/v1/weather/${firstLoc.id}`);
                    const weather = await weatherRes.json();
                    log('✓ Weather endpoint for ' + firstLoc.name + ': ' + weather.daily_forecasts.length + ' days', 'success');
                }
            } catch (error) {
                log('✗ Locations/Weather endpoint error: ' + error.message, 'error');
            }
        };
        
        // Initial checks
        (async () => {
            log('Starting diagnostics...');
            
            // Check backend
            try {
                const res = await fetch('/api/v1/health');
                if (res.ok) {
                    addStatus('Backend API', 'OK', 'Running on port 8000');
                } else {
                    addStatus('Backend API', 'ERROR', 'Not responding');
                }
            } catch (error) {
                addStatus('Backend API', 'ERROR', error.message);
            }
            
            // Check frontend
            addStatus('Frontend Server', 'OK', 'Vite running on port 3000');
            
            // Check for TypeScript errors
            addStatus('TypeScript', 'WARNING', 'Several type errors detected - may affect app loading');
            
            log('Initial checks complete');
        })();
    </script>
</body>
</html>

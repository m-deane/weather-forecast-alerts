<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .loading { color: #666; }
        .error { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>React Component Test</h1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function SimpleHome() {
            const [locations, setLocations] = useState([]);
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [weatherData, setWeatherData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                // Load locations
                fetch('/api/v1/locations')
                    .then(res => res.json())
                    .then(data => {
                        console.log('Locations loaded:', data);
                        setLocations(data.locations || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Error loading locations:', err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            const handleLocationSelect = async (locationId) => {
                setSelectedLocation(locationId);
                setWeatherData(null);
                
                try {
                    const response = await fetch(`/api/v1/weather/${locationId}`);
                    const data = await response.json();
                    console.log('Weather data loaded:', data);
                    setWeatherData(data);
                } catch (err) {
                    setError(err.message);
                }
            };

            if (loading) {
                return React.createElement('div', { className: 'loading' }, 'Loading Scottish mountains...');
            }

            if (error) {
                return React.createElement('div', { className: 'error' }, `Error: ${error}`);
            }

            return React.createElement('div', {},
                React.createElement('h2', {}, '🏔️ Scottish Mountain Weather'),
                React.createElement('p', {}, `Found ${locations.length} locations`),
                locations.length > 0 && React.createElement('div', {},
                    React.createElement('h3', {}, 'Mountain Locations:'),
                    React.createElement('ul', {},
                        locations.map(location => 
                            React.createElement('li', 
                                { 
                                    key: location.id,
                                    style: { 
                                        cursor: 'pointer', 
                                        padding: '10px',
                                        border: selectedLocation === location.id ? '2px solid blue' : '1px solid #ccc',
                                        margin: '5px 0',
                                        borderRadius: '4px'
                                    },
                                    onClick: () => handleLocationSelect(location.id)
                                },
                                `${location.name} (${location.area}) - ${location.elevation_m}m`
                            )
                        )
                    )
                ),
                weatherData && React.createElement('div', { className: 'success' },
                    React.createElement('h3', {}, `Weather for ${weatherData.location.name}`),
                    React.createElement('p', {}, `Forecasts available: ${weatherData.forecasts.length} days`)
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(SimpleHome));
    </script>
</body>
</html>

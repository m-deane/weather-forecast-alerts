<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        function App() {
            return (
                <div style={{padding: '20px'}}>
                    <h1>🏔️ Scottish Mountain Weather</h1>
                    <p>This is a simple test to verify React is working!</p>
                    <div style={{backgroundColor: '#f0f0f0', padding: '10px', marginTop: '10px'}}>
                        <h2>Status:</h2>
                        <ul>
                            <li>✅ React working</li>
                            <li>✅ Components rendering</li>
                            <li>✅ Basic functionality confirmed</li>
                        </ul>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

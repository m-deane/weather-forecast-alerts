<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scottish Mountain Weather - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .weather-card { transition: all 0.3s ease; }
        .weather-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-2xl font-bold">🏔️ Scottish Mountain Weather</h1>
            <p class="text-blue-100">Accurate forecasts for safe mountain adventures</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4">
        <!-- Status Message -->
        <div id="status" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
            <p class="text-green-700">✅ App is running! Loading mountain locations...</p>
        </div>

        <!-- Search Bar -->
        <div class="mb-6">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for a mountain..." 
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                onkeyup="filterLocations()"
            >
        </div>

        <!-- Locations Grid -->
        <div id="locations" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            <!-- Locations will be loaded here -->
        </div>

        <!-- Selected Location Weather -->
        <div id="weatherDetails" class="hidden">
            <h2 class="text-xl font-bold mb-4">Weather Forecast</h2>
            <div id="weatherContent" class="space-y-4">
                <!-- Weather details will be shown here -->
            </div>
        </div>
    </main>

    <script>
        // Global variables
        let allLocations = [];
        let selectedLocation = null;

        // Initialize the app
        async function init() {
            console.log('Initializing app...');
            await loadLocations();
        }

        // Load locations from API
        async function loadLocations() {
            try {
                const response = await fetch('/api/v1/locations');
                const data = await response.json();
                allLocations = data.locations || [];
                displayLocations(allLocations);
                
                document.getElementById('status').innerHTML = `
                    <p class="text-green-700">✅ Loaded ${allLocations.length} mountain locations!</p>
                    <p class="text-sm text-gray-600 mt-1">Click on any location to see its weather forecast.</p>
                `;
            } catch (error) {
                console.error('Error loading locations:', error);
                document.getElementById('status').innerHTML = `
                    <p class="text-red-700">❌ Error loading locations: ${error.message}</p>
                    <p class="text-sm text-gray-600 mt-1">Make sure the backend is running on http://localhost:8000</p>
                `;
            }
        }

        // Display locations
        function displayLocations(locations) {
            const container = document.getElementById('locations');
            container.innerHTML = locations.map(loc => `
                <div 
                    class="weather-card bg-white p-4 rounded-lg shadow hover:shadow-md cursor-pointer"
                    onclick="selectLocation('${loc.id}')"
                >
                    <h3 class="font-bold text-lg">${loc.name}</h3>
                    <p class="text-gray-600">${loc.area}</p>
                    <div class="mt-3 flex gap-2">
                        <span class="inline-block bg-gray-100 px-2 py-1 rounded text-sm">
                            ${loc.elevation_m}m
                        </span>
                        <span class="inline-block bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm">
                            ${loc.classification}
                        </span>
                        <span class="inline-block bg-purple-100 text-purple-700 px-2 py-1 rounded text-sm">
                            ${loc.difficulty || 'moderate'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Filter locations based on search
        function filterLocations() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allLocations.filter(loc => 
                loc.name.toLowerCase().includes(searchTerm) || 
                loc.area.toLowerCase().includes(searchTerm)
            );
            displayLocations(filtered);
        }

        // Select a location and load its weather
        async function selectLocation(locationId) {
            selectedLocation = allLocations.find(loc => loc.id === locationId);
            
            // Update UI to show loading
            document.getElementById('weatherDetails').classList.remove('hidden');
            document.getElementById('weatherContent').innerHTML = `
                <div class="text-center py-8">
                    <div class="text-gray-500">Loading weather for ${selectedLocation.name}...</div>
                </div>
            `;

            try {
                const response = await fetch(`/api/v1/weather/${locationId}`);
                const weatherData = await response.json();
                displayWeather(weatherData);
            } catch (error) {
                console.error('Error loading weather:', error);
                document.getElementById('weatherContent').innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-4 rounded-lg">
                        <p class="text-red-700">Error loading weather: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Display weather forecast
        function displayWeather(data) {
            const location = data.location;
            const forecasts = data.forecasts || [];
            
            let html = `
                <div class="bg-white p-6 rounded-lg shadow mb-6">
                    <h3 class="text-2xl font-bold mb-2">${location.name}</h3>
                    <p class="text-gray-600">${location.area} • ${location.elevation_m}m • ${location.classification}</p>
                    <p class="text-sm text-gray-500 mt-2">Last updated: ${new Date(data.last_updated).toLocaleString()}</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            `;

            // Display each day's forecast
            forecasts.forEach(day => {
                const summary = day.summary;
                const riskColor = summary.overall_hiking_score >= 7 ? 'green' : 
                                summary.overall_hiking_score >= 5 ? 'yellow' : 'red';
                
                html += `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h4 class="font-bold mb-2">${formatDate(day.date)}</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span>Temperature:</span>
                                <span class="font-medium">${summary.min_temp_c}°C - ${summary.max_temp_c}°C</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Wind:</span>
                                <span class="font-medium">${summary.max_wind_speed_kph} km/h</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Precipitation:</span>
                                <span class="font-medium">${summary.total_precipitation_mm}mm</span>
                            </div>
                            <div class="mt-3 pt-3 border-t">
                                <div class="flex items-center justify-between">
                                    <span>Hiking Score:</span>
                                    <span class="font-bold text-${riskColor}-600">${summary.overall_hiking_score}/10</span>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">${summary.dominant_conditions}</p>
                            </div>
                        </div>
                        
                        <!-- Period Details -->
                        <details class="mt-3">
                            <summary class="cursor-pointer text-sm text-blue-600 hover:text-blue-800">
                                View detailed periods
                            </summary>
                            <div class="mt-2 space-y-2">
                                ${day.periods.map(period => `
                                    <div class="text-xs p-2 bg-gray-50 rounded">
                                        <div class="font-medium">${period.period_type.toUpperCase()}</div>
                                        <div>${period.temperature_c}°C, ${period.wind_speed_kph}km/h ${period.wind_direction}</div>
                                        <div>${period.weather_description}</div>
                                        <div class="text-${getRiskColor(period.risk_level)}-600">Risk: ${period.risk_level}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('weatherContent').innerHTML = html;
        }

        // Helper functions
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            if (date.toDateString() === today.toDateString()) return 'Today';
            if (date.toDateString() === tomorrow.toDateString()) return 'Tomorrow';
            
            return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
        }

        function getRiskColor(risk) {
            switch(risk) {
                case 'low': return 'green';
                case 'moderate': return 'yellow';
                case 'high': return 'orange';
                case 'extreme': return 'red';
                default: return 'gray';
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

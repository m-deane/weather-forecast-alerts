# Docker Compose for Scottish Mountain Weather API Development Environment

version: '3.8'

services:
  # PostgreSQL Database with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: mountain_weather_db
    environment:
      POSTGRES_DB: mountain_weather
      POSTGRES_USER: mountain_weather_user
      POSTGRES_PASSWORD: dev_password_change_in_production
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - mountain_weather_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mountain_weather_user -d mountain_weather"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mountain_weather_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mountain_weather_net
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mountain_weather_api
    environment:
      DATABASE_URL: postgresql://mountain_weather_user:dev_password_change_in_production@db:5432/mountain_weather
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      # Mount the existing weather_scraper.py and config
      - ./weather_scraper.py:/app/weather_scraper.py
      - ./config.yaml:/app/config.yaml
      - ./forecasts:/app/forecasts
      # Mount backend code for development (remove in production)
      - ./backend:/app
    networks:
      - mountain_weather_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Weather Data Updater (separate service for background updates)
  weather_updater:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mountain_weather_updater
    environment:
      DATABASE_URL: postgresql://mountain_weather_user:dev_password_change_in_production@db:5432/mountain_weather
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    volumes:
      - ./weather_scraper.py:/app/weather_scraper.py
      - ./config.yaml:/app/config.yaml
      - ./forecasts:/app/forecasts
      - ./backend:/app
    networks:
      - mountain_weather_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python data_ingestion.py --interval 4
    # This service runs the weather scraper on a schedule

  # Frontend Development Server
  frontend:
    image: node:20-alpine
    container_name: mountain_weather_frontend
    working_dir: /app
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mountain_weather_net
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  # Nginx Reverse Proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: mountain_weather_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - mountain_weather_net
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - production

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: mountain_weather_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mountain_weather_net
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for monitoring dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: mountain_weather_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_change_in_production
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - mountain_weather_net
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  mountain_weather_net:
    driver: bridge